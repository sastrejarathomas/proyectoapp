<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>

<main layout:fragment="contenido">

    <section class="hero">
        <div class="form-container">

            <h2 th:text="#{registro.usuario}"></h2>

            <form th:action="@{/usuario/crear}" method="post">

                Nombre: <input type="text" name="nombre"required = required ><br><br>
                Edad: <input type="number" name="edad" required = required><br><br>
                Email: <input type="email" name="email" required = required><br><br>
                Contraseña: <input type="password" name="contrasena" required = required ><br><br>

                <button type="submit" class="btn" th:text="#{Crear.usuario}"></button>

            </form>

            <br>
            <a class="btn"  th:href="@{/sesion/iniciar}" th:text="#{ya.tengo.cuenta}"></a>

        </div>
    </section>

</main>

</body>
</html>
