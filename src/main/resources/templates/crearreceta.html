<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>

<main layout:fragment="contenido">

    <section class="hero">
        <div class="form-container">

            <h2 th:text="#{crear.receta}"></h2>

            <form th:action="@{/recetas/guardar}" method="post">

                <label>Nombre de la receta:</label><br>
                <input type="text" name="nombre" placeholder="Ej: Pizza casera" required><br><br>

                <label>Descripción:</label><br>
                <textarea name="descripcion" placeholder="Describe la receta..." required></textarea><br><br>

                <button class="btn" type="submit" th:text="#{guardar}"></button>

            </form>

            <br>
            <a class="btn" th:href="@{/recetas}" th:text="#{volver.a.recetas}"></a>

        </div>
    </section>

</main>

</body>
</html>
